name: Release Binaries (tag)

on:
  push:
    tags:
      - v*

permissions:
  contents: read

env:
  APP_NAME: simple-file-store-desktop
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  validate-tag:
    name: Validate tag format
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.check.outputs.is_valid }}
    steps:
      - name: Check tag pattern
        id: check
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "is_valid=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} matches expected pattern"
          else
            echo "is_valid=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} does not match pattern v[0-9]+.[0-9]+.[0-9]+*; skipping release build"
          fi

  build:
    name: Build ${{ matrix.target.label }}
    needs: validate-tag
    if: needs.validate-tag.outputs.is_valid == 'true'
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: Linux x86_64
            os: ubuntu-22.04
            platform: linux/amd64
            artifact: simple-file-store-desktop-linux-x86_64.tar.gz
          - label: Linux arm64
            os: ubuntu-22.04-arm
            platform: linux/arm64
            artifact: simple-file-store-desktop-linux-arm64.tar.gz
          - label: Windows x86_64
            os: windows-latest
            platform: windows/amd64
            artifact: simple-file-store-desktop-windows-x86_64.zip
          - label: Windows arm64
            os: windows-11-arm
            platform: windows/arm64
            artifact: simple-file-store-desktop-windows-arm64.zip
          - label: macOS x86_64
            os: macos-15-intel
            platform: darwin/amd64
            artifact: simple-file-store-desktop-macos-x86_64.zip
          - label: macOS arm64
            os: macos-latest
            platform: darwin/arm64
            artifact: simple-file-store-desktop-macos-arm64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build Wails application (Windows)
        if: runner.os == 'Windows'
        run: go tool wails build --platform "${{ matrix.target.platform }}" -o "${{ env.APP_NAME }}.exe"

      - name: Build Wails application (non-Windows)
        if: runner.os != 'Windows'
        run: go tool wails build --platform "${{ matrix.target.platform }}" -o "${{ env.APP_NAME }}"

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -C build/bin -czf "dist/${{ matrix.target.artifact }}" "${{ env.APP_NAME }}"

      - name: Package macOS application bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --keepParent "build/bin/${{ env.APP_NAME }}.app" "dist/${{ matrix.target.artifact }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $binaryPath = "build/bin/$env:APP_NAME.exe"
          if (-not (Test-Path $binaryPath)) {
            $binary = Get-ChildItem -Path build/bin -Filter "*.exe" -File | Select-Object -First 1
            if (-not $binary) {
              throw "Unable to find built Windows binary in build/bin"
            }
            $binaryPath = $binary.FullName
          }
          Compress-Archive -Path $binaryPath -DestinationPath "dist/${{ matrix.target.artifact }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    needs:
      - validate-tag
      - build
    if: needs.validate-tag.outputs.is_valid == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: simple-file-store-desktop-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
